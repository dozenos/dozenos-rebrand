# mirror-flags.conf -- authoritative per-mirror mirror-push.sh flag table.
#
# Format: <target-repo-name><TAB or spaces><flags...>
# A mirror not listed here is a PLAIN mirror (no flags beyond
# --target/--branch, which rebake-mirrors.yml always supplies).
#
# WHY THIS FILE EXISTS: a mirror's flags are baked into its own generated
# sync.yml, and its self-sync re-bakes whatever it already had -- so a mirror
# can never GAIN or LOSE a flag through self-sync. The flag set only ever
# changes when something invokes mirror-push.sh with the flags stated
# explicitly. Keeping that statement in a doc table (SYNC.md) meant the only
# executable copy was whatever happened to be baked in each mirror, which has
# already caused one outage: vyconf was re-pushed WITHOUT its overlay flag on
# 2026-07-09 and its daily self-sync then kept reverting the overlay's fix,
# failing every dozenos-1x build. This file is the executable copy;
# rebake-mirrors.yml reads it, so a rebake repairs drifted flags instead of
# perpetuating them.
#
# Keep SYNC.md's table in sync with this file -- this file wins.

dozenos-build	--build-repo
dozenos-1x	--overlay dozenos-rebrand/overlay-dozenos-1x --allow-residuals --ensure-pin-tags
