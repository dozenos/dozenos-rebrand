image_format = ["vmdk"]

disk_size = 8
image_opts = "-o subformat=streamOptimized"

packages = ["cloud-init", "awscli", "dozenos-1x-aws", "amazon-ssm-agent"]

[boot_settings]
console_type = "ttyS"
console_num = "0"
console_speed = "115200"

[[includes_chroot]]
path = "etc/cloud/cloud.cfg.d/90_dpkg.cfg"
data = """datasource_list: [ Ec2 ]
datasource:
  Ec2:
    apply_full_imds_network_config: false
"""
