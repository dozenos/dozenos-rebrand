# rebrand-map.conf -- data consumed by rename-transform.sh
#
# VyOS -> DozenOS rebrand (Rocky-style debrand). See REBRAND-PLAN.md Appendix C.
# This file is sourced as bash. It carries NO logic, only data.
#
# ---------------------------------------------------------------------------
# Case-preserving four-form replacement rules ("FROM=TO", case-SENSITIVE).
# ---------------------------------------------------------------------------
# The four forms are the ONLY spellings of the token that occur in VyOS trees
# (Appendix C: no mixed forms such as vyOS/VyoS/vYos exist). Each rule is
# applied case-sensitively; the four output tokens (dozenos/DozenOS/DOZENOS/
# Dozenos) contain NO input token, so:
#   * order between rules is irrelevant, and
#   * a second pass is a no-op  => the transform is idempotent.
REBRAND_FORMS=(
  "vyos=dozenos"      # lower  : package names, paths, python module, urls, ids
  "VyOS=DozenOS"      # brand  : display strings, os-release NAME, docs, comments
  "VYOS=DOZENOS"      # upper  : shell var names, ISO volid, constants
  "Vyos=Dozenos"      # rare   : e.g. "# Vyos config" QAT comment
)

# ---------------------------------------------------------------------------
# Email / contact-address rewrite (applied BEFORE the four-form rules).
# ---------------------------------------------------------------------------
# Maintainer & similar addresses (debian/control Maintainer/Uploaders,
# changelog trailers, GPG UIDs, etc.) are rewritten to a NON-EXISTENT
# placeholder domain. `.local` is reserved (RFC 6762) and never resolves, so
# the shipped .deb metadata stays zero-`vyos` WITHOUT implying ownership of a
# real `dozenos.*` domain. These run first; the generic four-form rules then
# find no `vyos` left in the address.
#   maintainers@vyos.net / pkgs@vyos.net / *@lists.vyos.io  ->  *@dozenos.local
# Each entry is a BRE sed s/// expression applied with `sed -e`.
#
# IMPORTANT: the pattern REQUIRES an email local-part character immediately
# before the `@` (captured as \1 and preserved). This is what distinguishes a
# real address (`maint@vyos.net`) from a Python decorator (`@vyos.opmode`,
# where `@` starts the token with nothing before it) or a Ruby ivar. Decorators
# are left for the generic four-form rule, which correctly yields
# `@dozenos.opmode`. Without the local-part guard the rule mangled 15
# `@vyos.opmode` decorators in vyos-1x to `@dozenos.local` (item #6 bug #4).
EMAIL_REWRITES=(
  's/\([A-Za-z0-9._%+-]\)@[A-Za-z0-9.-]*vyos\.[A-Za-z]\+/\1@dozenos.local/g'
)

# ---------------------------------------------------------------------------
# Copyright-notice preservation (LEGAL, user decision 2026-07-11).
# ---------------------------------------------------------------------------
# GPL/LGPL require keeping copyright notices intact, and DozenOS holds no
# copyright on upstream code -- rewriting "Copyright VyOS Inc." to a DozenOS
# name would misattribute authorship. Rocky/Alma precedent: debrand
# trademarks, never copyright; the upstream name in a legal notice is
# nominative use, not a trademark violation. Mechanism: every content rule
# above is applied under a case-SENSITIVE `!`-negated line address built
# from this ERE, so any line matching it is left byte-identical (including
# maintainer emails on that line), and --verify exempts such lines from the
# residual count the same way.
#
# Case-sensitive on purpose: legal notices are written `Copyright` /
# `COPYRIGHT` / `©`. A case-insensitive match on the bare word broke
# dozenos-1x's build (2026-07-11): upstream vyos-1x's Makefile has a
# lowercase `copyright` LINT TARGET, and `all: clean copyright
# libvyosconfig ...` was preserved whole, leaving `libvyosconfig`
# untransformed while its target definition was renamed.
COPYRIGHT_LINE_GUARD='Copyright|COPYRIGHT|©'

# ---------------------------------------------------------------------------
# Whole files preserved byte-identical (LEGAL, file granularity).
# ---------------------------------------------------------------------------
# debian/copyright is the machine-read canonical copyright declaration of a
# Debian package -- line-level guarding transformed its non-`Copyright:`
# lines (upstream URLs, contact emails) and shipped a half-rewritten legal
# document. Entries are matched as exact target-relative paths or any
# `*/<entry>` suffix; matching files are skipped by the content pass and
# exempted from --verify's residual count BY PATH.
PRESERVE_FILES=(
  'debian/copyright'
)

# ---------------------------------------------------------------------------
# Tokens that MUST be preserved (compatibility -- REBRAND-PLAN VYATTA class).
# ---------------------------------------------------------------------------
# None of these contains a REBRAND_FORMS "from" token as a substring, so the
# substring replacement leaves them intact automatically. Listed here as an
# explicit contract; rename-transform.sh asserts the non-overlap at start-up.
PRESERVE_TOKENS=(
  "vyatta"
  "Vyatta"
  "VYATTA"
)

# ---------------------------------------------------------------------------
# C1 package-name list (REBRAND-PLAN Section 1): binary/source names that
# CONTAIN vyos and are therefore renamed by the generic four-form rule above.
# ---------------------------------------------------------------------------
# The generic rule is a strict superset of these (each name contains "vyos"),
# so no per-name special case is needed. This list is the documentation +
# self-check whitelist: rename-transform.sh --verify confirms none survive.
#   vyos-1x  ->  dozenos-1x   (and all its binary outputs)
C1_PACKAGES=(
  "vyos-1x"                     # source -> dozenos-1x
  "vyos-1x-aws"                 # -> dozenos-1x-aws
  "vyos-1x-smoketest"           # -> dozenos-1x-smoketest
  "vyos-1x-vmware"              # -> dozenos-1x-vmware
  "vyos-user-utils"             # -> dozenos-user-utils
  "libvyosconfig0"              # soname -> libdozenosconfig0
  "vyos-libnss-mapuser"         # -> dozenos-libnss-mapuser
  "vyos-libpam-radius-auth"     # -> dozenos-libpam-radius-auth
  "vyos-radius-shell"           # -> dozenos-radius-shell
  "vyos-http-api-tools"         # -> dozenos-http-api-tools
  "vyos-linux-firmware"         # -> dozenos-linux-firmware
  "vyos-intel-i40e"             # -> dozenos-intel-i40e
  "vyos-intel-iavf"             # -> dozenos-intel-iavf
  "vyos-intel-ice"              # -> dozenos-intel-ice
  "vyos-intel-ixgbe"            # -> dozenos-intel-ixgbe
  "vyos-intel-ixgbevf"          # -> dozenos-intel-ixgbevf
  "vyos-intel-qat"              # -> dozenos-intel-qat
  "vyos-drivers-realtek-r8126"  # -> dozenos-drivers-realtek-r8126
  "vyos-drivers-realtek-r8152"  # -> dozenos-drivers-realtek-r8152
  "vyos-ipt-netflow"            # -> dozenos-ipt-netflow
)

# ---------------------------------------------------------------------------
# Exact-`=`-pin stamp exclusion list (item #16, RETROSPECTIVE.md Section 3d
# gotcha/§(c) "General rule for CI").
# ---------------------------------------------------------------------------
# rename-transform.sh's optional --stamp/REBRAND_VERSION_STAMP hook appends
# `+git<DATE.SHA>` to a package's newest debian/changelog entry so apt sees a
# monotonically increasing version for a branch-tracked C2 recipe. That is
# WRONG for any Debian source another shipped package exact-`=`-pins: dep-graph
# `iso_hard_deps.vyatta_cfg_bash_completion_exact_pin` records that vyatta-cfg's
# debian/control pins `bash-completion (= 1:2.8-6)` exactly, and
# scripts/package-build/bash-completion/ genuinely rebuilds that source
# locally (VyOS deliberately tracks an OLDER version than current Debian
# ships) -- stamping it would silently turn the shipped version into
# `1:2.8-6+git...`, which no longer satisfies `= 1:2.8-6`, breaking the
# ephemeral apt repo's dependency resolution for vyatta-cfg.
#
# Each entry is the Debian SOURCE package name (debian/changelog's `Source:`
# field, i.e. the string BEFORE the version parens on the changelog's first
# line) -- NOT the recipe directory name, though today they are identical for
# every entry below. rename-transform.sh's stamp step (section 4) skips
# stamping (and logs why) for any source name in this list, REGARDLESS of
# whether --stamp/REBRAND_VERSION_STAMP was passed -- this is a hard guard,
# not an opt-out, so a future recipe/CI step that turns on stamping broadly
# cannot silently reintroduce this bug class.
#
# Update this list whenever a NEW exact `=` pin appears anywhere in the
# shipped tree's debian/control files (grep '(=' across every recipe's
# debian/control to re-audit on upstream sync -- this is a "which recipes
# currently have exact pins" one-time-decision list, not a mechanism, per
# RETROSPECTIVE.md's own deterministic-vs-one-time-decision table).
EXACT_PIN_STAMP_EXCLUDE=(
  "bash-completion"   # vyatta-cfg debian/control: Depends: ... bash-completion (= 1:2.8-6), ...
)
