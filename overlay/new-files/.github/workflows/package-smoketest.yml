# DozenOS ISO integration/smoketest workflow.
#
# Ported from the upstream build repo's own "package smoketest" workflow
# (see dozenos-rebrand/WORKFLOW-POLICY.md item #8). Same shape as the
# upstream original (build a real ISO, then run its config-load smoketests
# inside it), with three adaptations:
#
# 1. The upstream original's `set_config` job reads a per-branch JSON config
#    file to pick a `container_image`/package-mirror URL per target branch,
#    because it supports 3 branches. DozenOS mirrors only `rolling`
#    (dozenos-rebrand/mirror-push.sh's only supported branch -- see
#    dozenos-rebrand/WORKFLOW-POLICY.md and mirror-push.sh's own usage), so
#    that per-branch config indirection is collapsed to constants below; no
#    `.github/config/*.json` is reintroduced (the wholesale `.github/` strip
#    removes it and nothing recreates it).
# 2. The upstream original's job-level `container:` field can't express
#    DozenOS's second bind mount (`/dozenos-rebrand`, needed for the same
#    `pre_build_hook = "/dozenos-rebrand/rename-transform.sh ."` reason as
#    rebuild-packages.yml -- see that workflow's own comment), so the build
#    step here runs `docker run` directly with both mounts instead of using
#    `jobs.<id>.container`.
# 3. The upstream original's `result` job posts a PR comment via
#    pull_request_target -- dozenos/dozenos-build is machine-generated by
#    mirror-push.sh (one push per upstream sync, no human-authored PRs land
#    on it), so there is no PR to comment on; that job is dropped and job
#    success/failure alone gates the workflow.
# 4. Not in the upstream original at all: a Secure Boot MOK injection step
#    (progress item #10, see ../../../SB-SIGNING.md) runs before the ISO
#    build so the build produces a signed kernel when the org secrets
#    `MOK_SIGNING_KEY`/`MOK_SIGNING_CERT` are configured (guarded -- a
#    no-op, identical to today's unsigned behavior, when they are not), plus
#    a matching cleanup step that always runs afterward. dozenos-rebrand is
#    already checked out for `pre_build_hook` (adaptation #2), so
#    `release/inject-mok-cert.sh` is reachable at a fixed relative path with
#    no extra checkout.
# 5. Not in the upstream original at all: an ephemeral in-job DozenOS apt
#    repo (progress item #13, see ../../../ISO-BUILD.md). DozenOS has no
#    public apt mirror (../../../DISTRIBUTION.md §1), yet the ISO's own
#    package list requires `dozenos-1x` (data/live-build-config/
#    package-lists/dozenos-base.list.chroot) -- so the ISO build needs SOME
#    apt source or that install fails. "Fetch recently built DozenOS
#    packages" is a best-effort (`continue-on-error: true`, never
#    `set -e`) step that merges the `deb-*` artifacts of the most recent
#    successful `rebuild-packages.yml` runs (bounded by
#    `PACKAGE_HISTORY_LIMIT`, oldest-first so a newer rebuild of the same
#    package wins) into `dozenos-debs/`. The ISO-build step then mounts that
#    directory into the container read-only and, only if it actually found
#    any `.deb`, calls `release/make-ephemeral-apt-repo.sh` *inside* the
#    same container invocation that runs `build-dozenos-image` (so the
#    `file://` path it emits is already correct from the container's own
#    point of view -- no host/container path translation needed) to build
#    the repo and pass its `--dozenos-mirror` value through. When nothing
#    was found (e.g. first bring-up, before any `rebuild-packages.yml` run
#    has ever succeeded), `--dozenos-mirror ""` is used, identical to
#    today's behavior. See ../../../ISO-BUILD.md for the full mechanism and
#    why the *complete*, guaranteed-fresh package set is item #17's nightly
#    workflow's job instead (a full from-scratch rebuild in the same run,
#    not a best-effort scan of past CI history like this integration test
#    uses).
name: DozenOS ISO integration test

on:
  workflow_dispatch: {}
  push:
    branches:
      - rolling
    paths:
      - '**'
      - '!.github/**'
      - '!**/*.md'
      - '!scripts/package-build/**'
      - '!docker/**'

permissions:
  contents: read

env:
  DEBIAN_MIRROR: http://deb.debian.org/debian/
  DEBIAN_SECURITY_MIRROR: http://deb.debian.org/debian-security
  # How many of the most recent successful rebuild-packages.yml runs (on
  # rolling) to scan for deb-* artifacts when assembling the item #13
  # ephemeral apt repo, below. Bounded so a long project history doesn't
  # make this integration test scan an unbounded number of past runs; 7-day
  # artifact retention (rebuild-packages.yml's own `retention-days: 7`)
  # means anything older than that has already expired anyway.
  PACKAGE_HISTORY_LIMIT: 50

jobs:
  build_iso:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
      # Needed for "Fetch recently built DozenOS packages" below: `gh run
      # list`/`gh run download` against this same repo's own past
      # rebuild-packages.yml runs. Same-repo only -- no cross-repo token
      # needed here, unlike the dozenos-rebrand checkout below (that one
      # genuinely needs BUILD_PAT, see ../../../CI-SECRETS.md and
      # ../../../DISTRIBUTION.md §7 "GITHUB_TOKEN suffices").
      actions: read
    outputs:
      build_version: ${{ steps.version.outputs.build_version }}
    env:
      # The `secrets` context is NOT usable in a step-level `if:` (GitHub
      # rejects the whole file with "Unrecognized named-value: 'secrets'"),
      # and workflow-level `env:` cannot read `secrets` either -- only
      # job-level env can. Mirror the two MOK secrets here so the
      # signed-vs-unsigned `if:` guards below test `env.*`. Empty (unset) when
      # the org secrets are absent -- exactly the unsigned-build case.
      MOK_SIGNING_KEY: ${{ secrets.MOK_SIGNING_KEY }}
      MOK_SIGNING_CERT: ${{ secrets.MOK_SIGNING_CERT }}
    steps:
      - name: Checkout dozenos-build
        uses: actions/checkout@v7
        with:
          path: dozenos-build

      # See rebuild-packages.yml's comment: /dozenos-rebrand must be present
      # at that absolute path for pre_build_hook to resolve.
      - name: Checkout dozenos-rebrand
        uses: actions/checkout@v7
        with:
          repository: dozenos/dozenos-rebrand
          token: ${{ secrets.BUILD_PAT }}
          path: dozenos-rebrand

      - name: Generate ISO version string
        id: version
        run: echo "build_version=$(date -u +'%Y.%m.%d-%H%M-integration')" >> "$GITHUB_OUTPUT"

      # See adaptation #5 above / ../../../ISO-BUILD.md. Best-effort: merges
      # deb-* artifacts from up to $PACKAGE_HISTORY_LIMIT recent successful
      # rebuild-packages.yml runs into dozenos-debs/, oldest-first so a
      # newer rebuild of the same package overwrites an older one. Never
      # hard-fails the job (no `set -e`, explicit `|| true` on every gh
      # call, plus a belt-and-suspenders `continue-on-error`) -- an empty or
      # partially-populated dozenos-debs/ is a valid, expected outcome
      # (falls back to today's zero-mirror build, see the next step).
      - name: Fetch recently built DozenOS packages (best effort)
        id: fetch_debs
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          mkdir -p dozenos-debs
          run_ids=$(gh run list --repo "${{ github.repository }}" \
            --workflow=rebuild-packages.yml --branch rolling --status success \
            --limit "$PACKAGE_HISTORY_LIMIT" --json databaseId --jq '.[].databaseId' 2>/dev/null)
          for run_id in $(printf '%s\n' "$run_ids" | tac); do
            [ -n "$run_id" ] || continue
            # Each run gets its own subdirectory (never re-used across runs,
            # so there is no ambiguity around whether `gh run download`
            # overwrites or errors on a name collision). release/
            # make-ephemeral-apt-repo.sh searches dozenos-debs/ recursively,
            # so every run's packages are picked up regardless of nesting;
            # a same-named .deb from two different runs (only possible if a
            # package's version genuinely did not change between rebuilds,
            # in which case the content is redundant anyway) is harmless
            # either way it resolves.
            gh run download "$run_id" --repo "${{ github.repository }}" \
              --pattern 'deb-*' --dir "dozenos-debs/run-$run_id" 2>/dev/null || true
          done
          deb_count=$(find dozenos-debs -name '*.deb' 2>/dev/null | wc -l)
          echo "I: merged $deb_count .deb file(s) from up to $PACKAGE_HISTORY_LIMIT recent successful rebuild-packages.yml run(s)"

      # See adaptation #4 above / ../../../SB-SIGNING.md. No-ops (does not
      # run at all) when the org secrets are not configured -- identical to
      # today's unsigned-build behavior in that case.
      - name: Inject MOK signing key+cert
        if: ${{ env.MOK_SIGNING_KEY != '' && env.MOK_SIGNING_CERT != '' }}
        run: dozenos-rebrand/release/inject-mok-cert.sh dozenos-build

      # Item #13 (../../../ISO-BUILD.md): builds the ephemeral apt repo
      # *inside* this same container invocation, right before
      # build-dozenos-image runs, from whatever "Fetch recently built
      # DozenOS packages" above found (possibly nothing). Doing it in-container
      # (rather than on the runner host beforehand) means
      # release/make-ephemeral-apt-repo.sh's own `file://<output-dir>` value
      # is already correct from build-dozenos-image's point of view with no
      # host-vs-container path translation -- both it and build-dozenos-image
      # run in the same mount namespace. /dozenos-debs is always mounted
      # (read-only) even when empty, so this never errors on a missing
      # source path; DOZENOS_MIRROR simply stays "" (identical to today's
      # behavior) when no .deb was found.
      - name: Build custom ISO image
        run: |
          docker run --rm \
            --sysctl net.ipv6.conf.lo.disable_ipv6=0 --privileged \
            -v "${{ github.workspace }}/dozenos-build:/dozenos" \
            -v "${{ github.workspace }}/dozenos-rebrand:/dozenos-rebrand" \
            -v "${{ github.workspace }}/dozenos-debs:/dozenos-debs:ro" \
            -w /dozenos \
            -e BUILD_BY="${{ vars.BUILD_BY }}" \
            -e DEBIAN_MIRROR="${{ env.DEBIAN_MIRROR }}" \
            -e DEBIAN_SECURITY_MIRROR="${{ env.DEBIAN_SECURITY_MIRROR }}" \
            -e ISO_VERSION="${{ steps.version.outputs.build_version }}" \
            ghcr.io/dozenos/dozenos-build:rolling \
            bash -c '
              set -euo pipefail
              DOZENOS_MIRROR=""
              if [ -n "$(find /dozenos-debs -name "*.deb" -print -quit 2>/dev/null)" ]; then
                DOZENOS_MIRROR=$(/dozenos-rebrand/release/make-ephemeral-apt-repo.sh /dozenos-debs /tmp/dozenos-apt-repo)
                echo "I: ephemeral DozenOS apt repo built -- --dozenos-mirror \"$DOZENOS_MIRROR\""
              else
                echo "I: no previously built DozenOS packages available -- building with an empty --dozenos-mirror (same as before item #13)"
              fi
              sudo --preserve-env ./build-dozenos-image \
                --architecture amd64 \
                --build-by "$BUILD_BY" \
                --build-type release \
                --custom-package dozenos-1x-smoketest \
                --debian-mirror "$DEBIAN_MIRROR" \
                --debian-security-mirror "$DEBIAN_SECURITY_MIRROR" \
                --version "$ISO_VERSION" \
                --dozenos-mirror "$DOZENOS_MIRROR" \
                generic
            '

      # Always runs (even if the build step above failed) to shrink the
      # window the decoded private key sits in this job's own git worktree.
      # A no-op (nothing to clean) when the inject step above didn't run.
      # The runner is destroyed at job end regardless; this is defense in
      # depth, not the only removal -- see SB-SIGNING.md §3/§6.
      - name: Clean up injected MOK key
        if: ${{ always() && env.MOK_SIGNING_KEY != '' && env.MOK_SIGNING_CERT != '' }}
        run: dozenos-rebrand/release/inject-mok-cert.sh dozenos-build --cleanup

      - uses: actions/upload-artifact@v7
        with:
          retention-days: 2
          name: dozenos-${{ steps.version.outputs.build_version }}
          path: |
            dozenos-build/build/live-image-amd64.hybrid.iso
            dozenos-build/build/manifest.json

  test_config_load:
    needs: build_iso
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout dozenos-build
        uses: actions/checkout@v7
        with:
          path: dozenos-build

      - uses: actions/download-artifact@v8
        with:
          name: dozenos-${{ needs.build_iso.outputs.build_version }}
          path: dozenos-build/build

      - name: DozenOS config load tests
        run: |
          docker run --rm \
            --sysctl net.ipv6.conf.lo.disable_ipv6=0 --privileged \
            -v "${{ github.workspace }}/dozenos-build:/dozenos" \
            -w /dozenos \
            ghcr.io/dozenos/dozenos-build:rolling \
            bash -c 'sudo make testc'
