# DozenOS INCREMENTAL rebuild-dispatch receiver (item #15, build-unit
# normalization fixed by item #30).
#
# RECEIVING side of item #14's decentralized self-sync fan-out: every
# dozenos/* mirror's generated sync.yml (../../../sync.yml.template, see
# ../../../SYNC.md), after re-syncing itself from its own upstream, fires
#   gh api repos/dozenos/dozenos-build/dispatches \
#     -f event_type="dozenos-package-rebuild" \
#     -F "client_payload[package]=<that repo's own name>"
# via a runtime-minted org GitHub App token (the sync job's own GITHUB_TOKEN
# cannot dispatch cross-repo -- see dozenos-rebrand/CI-SECRETS.md §4 for the
# App setup that replaced the retired BUILD_PAT). THIS workflow is what
# receives that event inside
# dozenos-build, and its only job is to rebuild EXACTLY the changed
# package plus whatever the dependency graph says must ALSO rebuild --
# see ../../../dep-graph/dep-graph.json,
# ../../../dep-graph/resolve-rebuild-set.sh (item #15's bootstrap dep-graph
# + resolver), and ../../../dep-graph/nodes-to-build-units.sh (item #30,
# the NORMALIZING layer this workflow now consumes -- see below for why).
# Full spec, the event_type/payload contract, and worked examples:
# ../../../REBUILD-DISPATCH.md.
#
# *** THIS IS INCREMENTAL, NEVER A FULL REBUILD *** -- the `build` job's
# matrix is ALWAYS exactly the `resolve` job's resolved set (the changed
# package + its known transitive dependents), never
# "every scripts/package-build/* recipe." Contrast with
# ../rebuild-packages.yml (item #8), which rebuilds whatever changed in a
# push to dozenos-build's OWN tree -- this workflow instead reacts to a
# package changing in a DIFFERENT dozenos/* mirror repo and fans that one
# change out through the dependency graph.
#
# Event_type/payload contract (LOCKED, must match ../../../sync.yml.template
# exactly -- see ../../../REBUILD-DISPATCH.md's reconciliation note):
#   event_type:      dozenos-package-rebuild
#   client_payload:  { "package": "<dozenos/* mirror repo name>" }
#
# *** ITEM #30 FIX: build by UNIT, not by raw node name *** -- item #15's
# resolve job used to run resolve-rebuild-set.sh directly and `cd
# scripts/package-build/${{ matrix.pkg }}` for every resolved node. That
# broke for any node that is NOT a scripts/package-build/ directory name:
# several dep-graph.json nodes are binary .deb names (`python3-vici`,
# `libtac2`, `isc-kea-common`, `libyang3`, ...) emitted by a DIFFERENTLY
# NAMED recipe, or linux-kernel `--packages <block>` block names (`i40e`,
# `mlnx`, `realtek-r8126`, ...) that have no directory of their own at all
# (see dep-graph.json's own, now-fixed
# "_notes.item16_rebuild_dispatch_directory_mapping_gap"). The `resolve` job
# now runs ../../../dep-graph/nodes-to-build-units.sh instead of
# resolve-rebuild-set.sh directly: it computes the SAME transitive closure,
# then maps every resolved node to its real buildable UNIT via
# dep-graph.json's new "build_units.node_to_unit" map and DEDUPS (e.g.
# `libtac2` + `libtacplus-map1` both resolving alongside `tacacs` collapse
# to ONE `{"recipe":"tacacs"}` build). The emitted matrix is now built from
# UNIT OBJECTS, not bare strings:
#   generic unit: {"recipe": "<scripts/package-build subdir>"}
#   linux-kernel unit: {"recipe": "linux-kernel", "kernel_blocks": [...]}
# `client_payload.package` (the raw mirror repo name) is normalized through
# this SAME map at entry for free: nodes-to-build-units.sh resolves+maps the
# INPUT package itself as part of its own closure (resolve-rebuild-set.sh's
# closure always includes the queried package), so a mirror name like
# `dozenos-vpp-patches` or `libtacplus-map` reaches its real build unit
# (`vpp`, `tacacs`) with no separate normalization step needed here.
#
# `linux-kernel` family handling (updated by item #30 -- see
# nodes-to-build-units.sh's own header for the full "why" writeup):
# scripts/package-build/linux-kernel/ is one bespoke C1 recipe directory
# (its own build.py, not the generic scripts/package-build/build.py every
# other C2 recipe uses) whose package.toml declares the kernel PLUS every
# OOT kernel module as separate `--packages <name>`-selectable blocks
# sharing one working directory and a build-order dependency (the kernel
# must build before any OOT module reads its output) -- see
# ../../../dep-graph/dep-graph.json's naming note and
# ../../../MLNX-AND-DWARF.md for the neutral-mount requirement this build
# job's /dozenos mount already satisfies. `nodes-to-build-units.sh` collapses
# linux-kernel + any of its resolved dependents into ONE `linux-kernel` unit
# (never N independent per-block jobs) whose `kernel_blocks` is the sorted,
# deduped union of every resolved block PLUS `linux-kernel` itself, always
# (even when a lone OOT block like `accel-ppp-ng` is the only thing
# resolved) -- because `linux-kernel/build-kernel.sh` writes the
# `kernel-vars` file (`KERNEL_DIR=...`) every OOT driver script's own
# `build-intel-nic.sh`-style header requires, so filtering the kernel block
# itself OUT of `--packages` would build nothing but a hard "KERNEL_DIR not
# defined" failure. The `build` job's `linux-kernel` branch therefore always
# runs `python3 build.py --packages <the resolved blocks, kernel included>`
# -- narrower than item #15's original "no --packages filter, rebuild every
# block unconditionally" (a real efficiency improvement: a lone
# `accel-ppp-ng` change no longer also rebuilds every unrelated Intel NIC
# driver), while still always rebuilding the kernel itself first (block
# declaration order in package.toml is preserved by build.py's own filter,
# and `linux-kernel` is declared first).
name: DozenOS incremental rebuild (dispatch receiver)

on:
  repository_dispatch:
    types: [dozenos-package-rebuild]
  workflow_dispatch:
    inputs:
      package:
        description: 'Package name to resolve+rebuild (same value client_payload.package would carry, e.g. vpp, linux-kernel, vyconf) -- for manual testing of the resolver/build path'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: dozenos-rebuild-dispatch-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  # ------------------------------------------------------------------------- #
  # Job A: resolve -- read client_payload.package (or the manual test input),
  # run resolve-rebuild-set.sh against the bootstrap dep-graph, and collapse
  # the linux-kernel family (if present in the result) into one matrix entry.
  # ------------------------------------------------------------------------- #
  resolve:
    runs-on: ubuntu-latest
    outputs:
      package: ${{ steps.pkg.outputs.package }}
      matrix: ${{ steps.resolve.outputs.matrix }}
      any: ${{ steps.resolve.outputs.any }}
    steps:
      - name: Determine changed package
        id: pkg
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PACKAGE="${{ inputs.package }}"
          else
            PACKAGE="${{ github.event.client_payload.package }}"
          fi
          if [ -z "$PACKAGE" ]; then
            echo "::error::no package name found -- repository_dispatch client_payload.package was empty/missing, or the workflow_dispatch 'package' input was blank. Expected event_type dozenos-package-rebuild with client_payload.package set (see ../../../SYNC.md / ../../../REBUILD-DISPATCH.md)." >&2
            exit 1
          fi
          echo "I: changed package: $PACKAGE"
          echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"

      # dep-graph/ (dep-graph.json + resolve-rebuild-set.sh +
      # nodes-to-build-units.sh) lives in dozenos-rebrand, same cross-repo
      # checkout every other dozenos-build workflow already does (see
      # ../rebuild-packages.yml's own comment on why -- here it's the
      # resolver + graph, not pre_build_hook, but the checkout is the same
      # one).
      - name: Mint GitHub App token (dozenos-rebrand checkout)
        id: app_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.BUILD_APP_ID }}
          private-key: ${{ secrets.BUILD_APP_PRIVATE_KEY }}
          owner: dozenos
          repositories: dozenos-rebrand

      - name: Checkout dozenos-rebrand
        uses: actions/checkout@v7
        with:
          repository: dozenos/dozenos-rebrand
          token: ${{ steps.app_token.outputs.token }}
          path: dozenos-rebrand

      - name: Resolve incremental rebuild set into build units
        id: resolve
        run: |
          set -euo pipefail
          PACKAGE="${{ steps.pkg.outputs.package }}"

          # nodes-to-build-units.sh (item #30) wraps resolve-rebuild-set.sh:
          # same transitive closure, then normalized+deduped into real
          # buildable units -- see this workflow's own header comment and
          # that script's header for the full "why" writeup. Any node with
          # no known build unit (e.g. the documented "squid" case in
          # dep-graph.json's build_units.unmappable) is dropped with a
          # warning on its own stderr, never silently invented.
          MATRIX=$(dozenos-rebrand/dep-graph/nodes-to-build-units.sh "$PACKAGE" --graph dozenos-rebrand/dep-graph/dep-graph.json --json)
          echo "I: deduped build-unit matrix for '$PACKAGE': $MATRIX"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

          if [ "$MATRIX" = "[]" ]; then
            echo "any=false" >> "$GITHUB_OUTPUT"
          else
            echo "any=true" >> "$GITHUB_OUTPUT"
          fi

  # ------------------------------------------------------------------------- #
  # Job B: build -- INCREMENTAL. The matrix is exactly `resolve`'s deduped
  # build-UNIT set (item #30 -- see this workflow's own header), never the
  # full scripts/package-build/* tree. Same build shape as
  # ../rebuild-packages.yml (item #8): ghcr.io/dozenos/dozenos-build:rolling,
  # /dozenos + /dozenos-rebrand mounts, upload deb-<unit> artifacts -- plus
  # the linux-kernel-family special case described above.
  # ------------------------------------------------------------------------- #
  build:
    needs: resolve
    if: needs.resolve.outputs.any == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Each matrix entry is a build-UNIT object, not a bare node name (item
      # #30 fix): {"recipe": "<dir>"} for a generic C2 recipe, or
      # {"recipe": "linux-kernel", "kernel_blocks": [...]} for the (at most
      # one, always deduped) linux-kernel-family entry.
      matrix:
        unit: ${{ fromJson(needs.resolve.outputs.matrix) }}
    steps:
      - name: Checkout dozenos-build
        uses: actions/checkout@v7
        with:
          path: dozenos-build

      # Required for every C2 recipe's `pre_build_hook =
      # "/dozenos-rebrand/rename-transform.sh ."` (see
      # ../rebuild-packages.yml's own comment) -- same absolute-path
      # requirement applies whether the build reached this package through a
      # push to dozenos-build itself (item #8) or, as here, an incremental
      # dispatch from a dependency mirror (item #15).
      - name: Mint GitHub App token (dozenos-rebrand checkout)
        id: app_token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.BUILD_APP_ID }}
          private-key: ${{ secrets.BUILD_APP_PRIVATE_KEY }}
          owner: dozenos
          repositories: dozenos-rebrand

      - name: Checkout dozenos-rebrand
        uses: actions/checkout@v7
        with:
          repository: dozenos/dozenos-rebrand
          token: ${{ steps.app_token.outputs.token }}
          path: dozenos-rebrand

      - name: Free disk space (large recipes only)
        if: contains(fromJson('["vpp", "linux-kernel"]'), matrix.unit.recipe)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false

      # Neutral /dozenos mount + neutral dozenos_bld build user (see
      # ../../../MLNX-AND-DWARF.md #25) applies identically to every matrix
      # entry here, kernel/OOT included -- there is no separate upstream-org-
      # mounted code path anywhere in this workflow to accidentally take.
      - name: Build ${{ matrix.unit.recipe }}
        run: |
          set -euo pipefail
          RECIPE="${{ matrix.unit.recipe }}"
          if [ "$RECIPE" = "linux-kernel" ]; then
            # linux-kernel family: ONE build.py invocation, --packages
            # narrowed to exactly the resolved+deduped blocks (kernel itself
            # always included -- see this workflow's header comment for why
            # that is a correctness requirement, not just a convenience).
            BLOCKS_JSON='${{ toJson(matrix.unit.kernel_blocks) }}'
            BLOCKS=$(jq -r '(. // []) | join(" ")' <<< "$BLOCKS_JSON")
            if [ -z "$BLOCKS" ]; then
              echo "::error::linux-kernel matrix unit has no kernel_blocks -- refusing to build with an empty --packages filter (nodes-to-build-units.sh should never emit this; see its own header)" >&2
              exit 1
            fi
            echo "I: linux-kernel build -- python3 build.py --packages $BLOCKS"
            docker run --rm \
              -v "${{ github.workspace }}/dozenos-build:/dozenos" \
              -v "${{ github.workspace }}/dozenos-rebrand:/dozenos-rebrand" \
              -w /dozenos \
              ghcr.io/dozenos/dozenos-build:rolling \
              bash -c "cd scripts/package-build/linux-kernel && python3 build.py --packages $BLOCKS"
          else
            docker run --rm \
              -v "${{ github.workspace }}/dozenos-build:/dozenos" \
              -v "${{ github.workspace }}/dozenos-rebrand:/dozenos-rebrand" \
              -w /dozenos \
              ghcr.io/dozenos/dozenos-build:rolling \
              bash -c "cd scripts/package-build/$RECIPE && python3 ../build.py"
          fi

      - name: Upload built package(s)
        uses: actions/upload-artifact@v7
        with:
          name: deb-${{ matrix.unit.recipe }}
          path: dozenos-build/scripts/package-build/${{ matrix.unit.recipe }}/*.deb
          if-no-files-found: warn
          retention-days: 7

  # ------------------------------------------------------------------------- #
  # Job C: trigger-iso -- fire an ISO rebuild off the just-updated debs.
  #
  # DECISION: primarily trigger the IN-REPO `package-smoketest.yml` (item
  # #13's ISO integration workflow, already lives in this same dozenos-build
  # repo, already builds a real ISO and best-effort-merges recent deb-*
  # artifacts into an ephemeral apt repo, see ../../../ISO-BUILD.md). That
  # workflow already exists and already runs a real `build-dozenos-image`
  # today; a same-repo `workflow_dispatch` needs only the job's own
  # GITHUB_TOKEN (with `actions: write`), no cross-repo credential.
  #
  # dozenos/dozenos-nightly-build (item #17) is NOT yet created (see
  # ../../../DISTRIBUTION.md/../../../WORKFLOW-POLICY.md) -- once it exists,
  # it is the "full, guaranteed-fresh" nightly counterpart
  # (../../../ISO-BUILD.md §5's own "what item #17 should do instead" note).
  # This job ALSO best-effort-notifies it by name via a runtime-minted org
  # GitHub App token (cross-repo dispatch needs a cross-repo credential, not
  # GITHUB_TOKEN -- see ../../../CI-SECRETS.md §4), guarded with
  # `continue-on-error: true` so a 404
  # against a not-yet-existing repo never fails this job; once item #17
  # lands, this step starts working with zero changes needed here.
  # ------------------------------------------------------------------------- #
  trigger-iso:
    needs: [resolve, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Trigger in-repo ISO integration build (package-smoketest.yml)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh workflow run package-smoketest.yml --repo "${{ github.repository }}"
          echo "I: dispatched package-smoketest.yml on ${{ github.repository }} (in-repo ISO integration build)"

      - name: Mint GitHub App token (dozenos-nightly-build notify)
        id: app_token
        continue-on-error: true
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.BUILD_APP_ID }}
          private-key: ${{ secrets.BUILD_APP_PRIVATE_KEY }}
          owner: dozenos
          repositories: dozenos-nightly-build

      - name: Best-effort notify dozenos-nightly-build (item #17, not yet created)
        continue-on-error: true
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          set -uo pipefail
          if gh api repos/dozenos/dozenos-nightly-build/dispatches \
            -f event_type="dozenos-incremental-rebuild-complete" \
            -F "client_payload[package]=${{ needs.resolve.outputs.package }}" 2>&1; then
            echo "I: notified dozenos/dozenos-nightly-build"
          else
            echo "I: dozenos/dozenos-nightly-build dispatch failed -- expected until item #17 creates that repo; non-fatal (continue-on-error)"
          fi
