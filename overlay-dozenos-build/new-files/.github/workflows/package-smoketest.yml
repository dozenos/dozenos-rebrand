# DozenOS ISO integration/smoketest workflow: build a real ISO from the
# current rolling tree, then run its config-load smoketests inside it.
# Ported from the upstream "package smoketest" workflow with these
# adaptations:
#   - upstream's per-branch JSON config indirection is collapsed to
#     constants (DozenOS mirrors only `rolling`), and its PR-comment result
#     job is dropped (no human-authored PRs land on this machine-generated
#     mirror).
#   - the build runs `docker run` directly instead of `jobs.<id>.container`,
#     which cannot express the second bind mount (/dozenos-rebrand, needed
#     for every recipe's pre_build_hook -- see rebuild-packages.yml).
#   - a guarded Secure Boot MOK injection step (dozenos-rebrand/
#     SB-SIGNING.md) signs the kernel when the org secrets are configured;
#     a no-op otherwise.
#   - an ephemeral in-job DozenOS apt repo (dozenos-rebrand/ISO-BUILD.md):
#     DozenOS has no public apt mirror, yet the ISO's package list requires
#     dozenos-1x, so recent deb-* artifacts are merged best-effort into
#     dozenos-debs/ and served to the build. The complete, guaranteed-fresh
#     package set is the nightly workflow's job (full in-run rebuild);
#     this integration test only best-effort-scans recent CI history.
name: DozenOS ISO integration test

on:
  workflow_dispatch: {}
  push:
    branches:
      - rolling
    paths:
      - '**'
      - '!.github/**'
      - '!**/*.md'
      - '!scripts/package-build/**'
      - '!docker/**'

# Disposable, state-based validation: every run tests the CURRENT rolling
# tree, so only the newest run matters -- cancel-in-progress: true (unlike
# nightly.yml, which must never cancel a run that may be mid-publish).
# Without a group, burst trigger-iso dispatches would stack N parallel
# ~45-minute ISO builds for no added signal.
concurrency:
  group: dozenos-package-smoketest
  cancel-in-progress: true

permissions:
  contents: read

env:
  DEBIAN_MIRROR: http://deb.debian.org/debian/
  DEBIAN_SECURITY_MIRROR: http://deb.debian.org/debian-security
  # How many recent successful rebuild-packages.yml runs to scan for deb-*
  # artifacts. Bounded so a long history doesn't make this scan unbounded;
  # artifacts older than rebuild-packages.yml's 7-day retention have
  # expired anyway.
  PACKAGE_HISTORY_LIMIT: 50

jobs:
  build_iso:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
      # For "Fetch recently built DozenOS packages" below: `gh run list`/
      # `gh run download` against this same repo's own past runs.
      actions: read
    outputs:
      build_version: ${{ steps.version.outputs.build_version }}
    env:
      # The `secrets` context is not usable in a step-level `if:` (GitHub
      # rejects the whole file), and workflow-level env cannot read
      # `secrets` either -- only job-level env can. Mirror the two MOK
      # secrets here so the signed-vs-unsigned guards below test `env.*`.
      # Empty when the org secrets are absent = the unsigned-build case.
      MOK_SIGNING_KEY: ${{ secrets.MOK_SIGNING_KEY }}
      MOK_SIGNING_CERT: ${{ secrets.MOK_SIGNING_CERT }}
    steps:
      - name: Checkout dozenos-build
        uses: actions/checkout@v7
        with:
          path: dozenos-build

      # /dozenos-rebrand must be present at that absolute path for
      # pre_build_hook to resolve (see rebuild-packages.yml).
      - name: Mint GitHub App token (dozenos-rebrand checkout)
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.BUILD_APP_ID }}
          private-key: ${{ secrets.BUILD_APP_PRIVATE_KEY }}
          owner: dozenos
          repositories: dozenos-rebrand

      - name: Checkout dozenos-rebrand
        uses: actions/checkout@v7
        with:
          repository: dozenos/dozenos-rebrand
          token: ${{ steps.app_token.outputs.token }}
          path: dozenos-rebrand

      - name: Generate ISO version string
        id: version
        run: echo "build_version=$(date -u +'%Y.%m.%d-%H%M-integration')" >> "$GITHUB_OUTPUT"

      # Best-effort: merges deb-* artifacts from recent successful
      # rebuild-packages.yml runs into dozenos-debs/, oldest-first so a
      # newer rebuild of the same package wins. Never hard-fails (no
      # `set -e`, `|| true` on every gh call, plus continue-on-error) -- an
      # empty or partial dozenos-debs/ is a valid outcome that falls back to
      # a zero-mirror build.
      - name: Fetch recently built DozenOS packages (best effort)
        id: fetch_debs
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -uo pipefail
          mkdir -p dozenos-debs
          run_ids=$(gh run list --repo "${{ github.repository }}" \
            --workflow=rebuild-packages.yml --branch rolling --status success \
            --limit "$PACKAGE_HISTORY_LIMIT" --json databaseId --jq '.[].databaseId' 2>/dev/null)
          for run_id in $(printf '%s\n' "$run_ids" | tac); do
            [ -n "$run_id" ] || continue
            # Per-run subdirectories avoid `gh run download` name-collision
            # ambiguity; make-ephemeral-apt-repo.sh searches dozenos-debs/
            # recursively, so nesting doesn't matter.
            gh run download "$run_id" --repo "${{ github.repository }}" \
              --pattern 'deb-*' --dir "dozenos-debs/run-$run_id" 2>/dev/null || true
          done
          deb_count=$(find dozenos-debs -name '*.deb' 2>/dev/null | wc -l)
          echo "I: merged $deb_count .deb file(s) from up to $PACKAGE_HISTORY_LIMIT recent successful rebuild-packages.yml run(s)"

      # Does not run at all when the org secrets are not configured --
      # identical to an unsigned build (dozenos-rebrand/SB-SIGNING.md).
      - name: Inject MOK signing key+cert
        if: ${{ env.MOK_SIGNING_KEY != '' && env.MOK_SIGNING_CERT != '' }}
        run: dozenos-rebrand/release/inject-mok-cert.sh dozenos-build

      # The ephemeral apt repo is built inside this same container
      # invocation, from whatever the fetch step found (possibly nothing),
      # and consumed over localhost HTTP, NOT via its file:// URL: apt runs
      # inside the live-build chroot, whose filesystem root does not contain
      # the container's /tmp, so a container-side file:// path 404s on every
      # index fetch there (apt Ign-s the missing Packages index but
      # HARD-FAILS `lb build` on the missing Sources index). The chroot does
      # share the container network namespace, so a 127.0.0.1-bound server
      # is reachable from chroot apt at every stage. Do not revisit file://.
      # Same mechanism as dozenos-nightly-build's nightly.yml; see
      # make-ephemeral-apt-repo.sh's CONSUMPTION WARNING. /dozenos-debs is
      # always mounted (read-only) even when empty; DOZENOS_MIRROR simply
      # stays "" when no .deb was found.
      - name: Build custom ISO image
        run: |
          docker run --rm \
            --sysctl net.ipv6.conf.lo.disable_ipv6=0 --privileged \
            -v "${{ github.workspace }}/dozenos-build:/dozenos" \
            -v "${{ github.workspace }}/dozenos-rebrand:/dozenos-rebrand" \
            -v "${{ github.workspace }}/dozenos-debs:/dozenos-debs:ro" \
            -w /dozenos \
            -e BUILD_BY="${{ vars.BUILD_BY }}" \
            -e DEBIAN_MIRROR="${{ env.DEBIAN_MIRROR }}" \
            -e DEBIAN_SECURITY_MIRROR="${{ env.DEBIAN_SECURITY_MIRROR }}" \
            -e ISO_VERSION="${{ steps.version.outputs.build_version }}" \
            ghcr.io/dozenos/dozenos-build:rolling \
            bash -c '
              set -euo pipefail
              DOZENOS_MIRROR=""
              if [ -n "$(find /dozenos-debs -name "*.deb" -print -quit 2>/dev/null)" ]; then
                /dozenos-rebrand/release/make-ephemeral-apt-repo.sh /dozenos-debs /tmp/dozenos-apt-repo >/dev/null
                # localhost HTTP, not file:// -- see this step-s header
                # comment. Readiness is verified before lb build starts; if
                # the server ever died mid-build, apt would fail the job
                # loudly rather than build a wrong ISO. (Comments in this
                # single-quoted block must stay apostrophe-free.)
                (cd /tmp/dozenos-apt-repo && exec python3 -m http.server --bind 127.0.0.1 8099 >/tmp/dozenos-apt-http.log 2>&1) &
                for i in $(seq 1 50); do
                  curl -fsS -o /dev/null http://127.0.0.1:8099/dists/rolling/Release && break
                  sleep 0.2
                done
                curl -fsS -o /dev/null http://127.0.0.1:8099/dists/rolling/Release || { echo "E: ephemeral apt repo HTTP server did not come up"; exit 1; }
                DOZENOS_MIRROR="[trusted=yes] http://127.0.0.1:8099"
                echo "I: ephemeral DozenOS apt repo built + served -- --dozenos-mirror \"$DOZENOS_MIRROR\""
              else
                echo "I: no previously built DozenOS packages available -- building with an empty --dozenos-mirror"
              fi
              sudo --preserve-env ./build-dozenos-image \
                --architecture amd64 \
                --build-by "$BUILD_BY" \
                --build-type release \
                --custom-package dozenos-1x-smoketest \
                --debian-mirror "$DEBIAN_MIRROR" \
                --debian-security-mirror "$DEBIAN_SECURITY_MIRROR" \
                --version "$ISO_VERSION" \
                --dozenos-mirror "$DOZENOS_MIRROR" \
                generic
            '

      # Always runs (even if the build failed) to shrink the window the
      # decoded private key sits in this job's worktree; defense in depth,
      # the runner is destroyed at job end regardless (SB-SIGNING.md §3/§6).
      - name: Clean up injected MOK key
        if: ${{ always() && env.MOK_SIGNING_KEY != '' && env.MOK_SIGNING_CERT != '' }}
        run: dozenos-rebrand/release/inject-mok-cert.sh dozenos-build --cleanup

      - uses: actions/upload-artifact@v7
        with:
          retention-days: 2
          name: dozenos-${{ steps.version.outputs.build_version }}
          path: |
            dozenos-build/build/live-image-amd64.hybrid.iso
            dozenos-build/build/manifest.json

  test_config_load:
    needs: build_iso
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout dozenos-build
        uses: actions/checkout@v7
        with:
          path: dozenos-build

      - uses: actions/download-artifact@v8
        with:
          name: dozenos-${{ needs.build_iso.outputs.build_version }}
          path: dozenos-build/build

      - name: DozenOS config load tests
        run: |
          docker run --rm \
            --sysctl net.ipv6.conf.lo.disable_ipv6=0 --privileged \
            -v "${{ github.workspace }}/dozenos-build:/dozenos" \
            -w /dozenos \
            ghcr.io/dozenos/dozenos-build:rolling \
            bash -c 'sudo make testc'
