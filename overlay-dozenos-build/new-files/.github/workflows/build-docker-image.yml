# DozenOS build-container image workflow.
#
# Replaces the upstream "trigger docker image build" workflow, which only
# curl-dispatched the build into a private org-scoped "reuse" repo DozenOS
# does not have -- the real build+push is inlined here instead. Triggers on
# `push` to `rolling` rather than upstream's merged pull_request_target:
# the mirror is machine-generated by mirror-push.sh as one push per
# upstream sync, so there is no PR-merge event to react to.
name: Build DozenOS build-container image

on:
  push:
    branches:
      - rolling
    paths:
      - 'docker/**'
  schedule:
    # Weekly base-image refresh so the container picks up Debian base-image
    # security updates even in a week with no docker/** push. 02:00 sits
    # >2h before dozenos-nightly-build's weekly heartbeat cron
    # ('17 4 * * 1') so the refreshed image is already pushed when the
    # heartbeat pulls :rolling, and clear of the mirrors' shared 03:17
    # self-sync cron.
    - cron: '0 2 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: build-docker-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dozenos-build
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ghcr.io only -- the job's own GITHUB_TOKEN (permissions.packages:
      # write) suffices to push to the org's Container Registry; an external
      # registry would need a secret that CI-SECRETS.md does not define.
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dozenos-build image
        uses: docker/build-push-action@v7
        with:
          context: ./docker
          file: ./docker/Dockerfile
          push: true
          tags: ghcr.io/dozenos/dozenos-build:rolling
          cache-from: type=gha
          cache-to: type=gha,mode=max
