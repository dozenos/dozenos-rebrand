# DozenOS build-container image workflow.
#
# Ported from the upstream build repo's own "trigger docker image build"
# workflow (see dozenos-rebrand/WORKFLOW-POLICY.md item #8). The upstream
# original is a *trigger only* workflow: it curl-dispatches a docker-image
# build run in a separate, private org-scoped "reuse" repo
# (`secrets.REMOTE_OWNER`/`REMOTE_REUSE_REPO`) that does the actual
# `docker build`/`push`. DozenOS has no such private reuse repo, so this
# workflow inlines the real build+push instead of dispatching cross-repo --
# see dozenos-rebrand/overlay-dozenos-build/MANIFEST.md for the item #8 write-up. Same
# intent (rebuild the build-container image when docker/ changes), different
# (simpler, self-contained) mechanism.
#
# Trigger differs from the upstream original for the same reason: the
# original reacts to a merged pull_request_target (the upstream project
# accepts external PRs). DozenOS's mirror (dozenos/dozenos-build) is
# machine-generated by dozenos-rebrand/mirror-push.sh as a single push per
# upstream sync -- there is no PR-merge event to react to -- so this reacts
# to `push` on `rolling` instead, plus workflow_dispatch for manual rebuilds.
name: Build DozenOS build-container image

on:
  push:
    branches:
      - rolling
    paths:
      - 'docker/**'
  schedule:
    # Weekly base-image refresh (Mon 02:00 UTC) so the build container keeps
    # up with upstream docker/ changes + Debian base-image security updates
    # even in a week with no docker/** push. Downstream builds are NOT
    # auto-triggered from here (they have their own schedules / manual
    # dispatch) -- this only keeps the ghcr.io/dozenos/dozenos-build:rolling
    # image itself fresh. 02:00 deliberately sits >2h BEFORE
    # dozenos-nightly-build's weekly heartbeat cron ('17 4 * * 1') so the
    # refreshed image is already pushed when the heartbeat pulls :rolling
    # (it was 04:00 until 2026-07-09, racing the 04:17 heartbeat -- a
    # build+push slower than 17 minutes handed that week's heartbeat the
    # previous week's image), and also clear of the mirrors' shared
    # 03:17 self-sync cron.
    - cron: '0 2 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: build-docker-image-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout dozenos-build
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # ghcr.io only -- no external registry secret needed. The job's own
      # GITHUB_TOKEN (scoped by `permissions.packages: write` above) is
      # sufficient to push to the repo-owning org's Container Registry.
      # (If Docker Hub `docker.io/dozenos/dozenos-build` is ever wanted
      # instead, that needs a Docker Hub secret -- not currently defined in
      # dozenos-rebrand/CI-SECRETS.md -- so this intentionally defaults to
      # ghcr.io; see dozenos-rebrand/overlay-dozenos-build/MANIFEST.md for the rationale.)
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dozenos-build image
        uses: docker/build-push-action@v7
        with:
          context: ./docker
          file: ./docker/Dockerfile
          push: true
          tags: ghcr.io/dozenos/dozenos-build:rolling
          cache-from: type=gha
          cache-to: type=gha,mode=max
