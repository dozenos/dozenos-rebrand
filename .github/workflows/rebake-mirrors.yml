# Re-bake every dozenos/* mirror when this toolkit changes.
#
# A mirror's content is a FUNCTION of (upstream tree, this toolkit). Each
# mirror's own sync.yml checks out dozenos-rebrand@main at run time, so a
# toolkit change does propagate on its own -- but only on that mirror's daily
# cron, staggered across the fleet, up to ~24h late. This workflow closes the
# window by dispatching those same self-syncs immediately.
#
# It dispatches each mirror's sync.yml rather than running mirror-push.sh
# itself. A mirror's sync.yml is the single definition of how that mirror
# syncs -- upstream URL, baked flags, dispatch routing -- and re-implementing
# that here would mean a second code path to keep in step, plus push rights on
# every mirror instead of just permission to start their workflows.
#
# WHAT THIS DOES NOT DO: change a mirror's baked mirror-push.sh flags. Those
# live in the mirror's own sync.yml and its self-sync re-bakes whatever it
# already had, so a mirror can never gain, lose, or repair a flag through
# self-sync -- dispatched or scheduled. Changing a flag set is a deliberate
# manual re-push with the flags stated explicitly (see SYNC.md's flag table),
# which is rare and should stay reviewed rather than happening inside an
# automated fleet pass.
#
# Fan-out is safe downstream: dozenos-nightly-build's change-gate snapshots all
# mirror HEADs and compares the set, so a whole-fleet re-bake collapses into ONE
# image build, not one per mirror.
name: Re-bake mirrors

on:
  push:
    branches: [main]
    paths:
      # Toolkit files whose content lands IN the mirrors. Deliberately NOT
      # release/**, flavors/**, dep-graph/**, keys/** or *.md: the nightly
      # checks those out itself, they never enter a mirror tree, and a docs
      # commit must not re-bake 20 repos.
      - 'rename-transform.sh'
      - 'rebrand-map.conf'
      - 'mirror-push.sh'
      - 'ensure-pin-tags.sh'
      - 'sync.yml.template'
      - 'overlay-dozenos-build/**'
      - 'overlay-dozenos-1x/**'
      - '.github/workflows/rebake-mirrors.yml'
  workflow_dispatch:
    inputs:
      only:
        description: 'Re-bake only this mirror (repo name). Blank = the whole fleet.'
        required: false
        type: string

# One re-bake at a time: two concurrent fleet passes would have every mirror
# syncing twice over. Never cancel one in flight -- a half-baked fleet is worse
# than a late one.
concurrency:
  group: dozenos-rebake-mirrors
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  rebake:
    runs-on: ubuntu-latest
    steps:
      # Enumerating org repos and starting their workflows is a cross-repo
      # operation. No `repositories:` filter: the point is covering the whole
      # mirror set without a hand-kept list (CI-SECRETS.md section 4).
      - name: Mint GitHub App token (enumerate + dispatch)
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.BUILD_APP_ID }}
          private-key: ${{ secrets.BUILD_APP_PRIVATE_KEY }}
          owner: dozenos

      - name: Dispatch every mirror's self-sync
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          ONLY: ${{ inputs.only }}
        run: |
          set -euo pipefail

          # A dozenos/* repo with a `rolling` branch IS a mirror -- enumerating
          # by branch auto-covers mirrors added or removed later, with no
          # hand-kept list. Same rule dozenos-nightly-build's change-gate uses.
          # dozenos-nightly-build itself is not a mirror (it has no upstream).
          mirrors=()
          while read -r r; do
            [ -n "$r" ] || continue
            [ "$r" = "dozenos-nightly-build" ] && continue
            if gh api "repos/dozenos/$r/commits/rolling" --jq '.sha' >/dev/null 2>&1; then
              mirrors+=("$r")
            fi
          done < <(gh api --paginate orgs/dozenos/repos --jq '.[].name' | sort -u)

          if [ -n "${ONLY:-}" ]; then
            found=0
            for m in "${mirrors[@]}"; do [ "$m" = "$ONLY" ] && found=1; done
            [ "$found" -eq 1 ] || { echo "::error::'$ONLY' is not a mirror (no rolling branch)" >&2; exit 1; }
            mirrors=("$ONLY")
          fi
          [ "${#mirrors[@]}" -gt 0 ] || { echo "::error::no mirrors found" >&2; exit 1; }

          echo "re-baking ${#mirrors[@]} mirror(s)"
          # Collect failures instead of stopping at the first: one mirror
          # without a sync.yml must not leave the rest of the fleet stale, and
          # the summary below is the only record of which ones were skipped.
          failed=()
          for m in "${mirrors[@]}"; do
            if gh workflow run sync.yml -R "dozenos/$m" >/dev/null 2>&1; then
              echo "  dispatched: $m"
            else
              echo "  FAILED to dispatch: $m"
              failed+=("$m")
            fi
          done

          if [ "${#failed[@]}" -gt 0 ]; then
            echo "::error::could not dispatch ${#failed[@]} mirror(s): ${failed[*]}" >&2
            exit 1
          fi
          echo "all ${#mirrors[@]} mirror(s) dispatched"
